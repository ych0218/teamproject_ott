<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<main class="flex-grow-1 d-flex justify-content-center align-items-center py-5">
    <div class="rounded-4 shadow-lg"
         style="max-width: 440px; width: 100%; padding: 40px; background-color: #212529;">

        <h2 class="text-white mb-4" style="font-size: 1.4rem; font-weight: 500;">
            성인 인증이 필요합니다
        </h2>

        <form method="post">
            <input type="date" name="birth" required
                   class="form-control py-3 border-0 mb-3"
                   style="background-color: #333b41; color: #fff; border-radius: 8px;">

            <button type="submit"
                    class="btn btn-light w-100 fw-bold py-3"
                    style="border-radius: 8px;">
                인증하기
            </button>
        </form>

        <p class="mt-3 text-secondary" style="font-size: 0.8rem;">
            만 19세 이상만 이용 가능합니다.
        </p>

    </div>
</main>
</body>
</html>
