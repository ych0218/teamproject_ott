{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/notice_detail.css') }}">

{% endblock %}

{% block content %}
<div class="detail_support_wrapper">
    <div class="detail_support_card">

        <header class="detail_support_header">
            <span class="detail_support_category">NOTICE</span>
            <h2 class="detail_support_title">{{ notice.title }}</h2>
            <div class="notice_meta_box">
                관리자({{ notice.admin_unique_id }}) | {{ notice.created_at.strftime('%Y.%m.%d') }}
            </div>
        </header>

        <article class="detail_support_body">
            {{ notice.content }}
        </article>

        <div class="detail_support_empty_msg">
            공지사항의 상세 내용입니다. 관련 문의는 고객센터를 이용해 주세요.
        </div>

        <footer class="detail_support_actions">
            <a href="{{ url_for('mypage.support_center') }}" class="detail_support_back_btn">목록으로 돌아가기</a>
        </footer>

    </div>
</div>
{% endblock %}
