{% extends "base.html" %}
{% block title %}
    내정보 수정
{% endblock %}

{% block styles %}
 <link rel="stylesheet" href="{{ url_for('static', filename='css/mypage_change.css') }}">
{% endblock %}



{% block content %}
<div class="mypage-wrapper">
    <div class="top-action-wrapper">
        <div class="right-actions">
            <!-- 현재 페이지임을 나타내기 위해 active 클래스 추가 -->
            <a href="{{ url_for('mypage.change_info') }}" class="action-btn active">회원정보 수정</a>
            <a href="{{ url_for('mypage.support') }}" class="action-btn">고객센터</a>
            <a href="{{ url_for('mypage.subscription') }}" class="action-btn primary">이용권 구매</a>
        </div>
    </div>

    <!-- 회원정보 수정 섹션 추가 -->
    <section class="change-info-section">
        <div class="change-card">
            <h2 class="section-title">회원정보 수정</h2>

            <form method="POST" action="{{ url_for('mypage.change_info') }}" class="edit-form">
                <div class="input-group">
                    <label>이름</label>
                    <input type="text" name="user_name" value="{{ user.user_name }}" placeholder="이름을 입력하세요">
                </div>

                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" value="{{ user.user_email }}" readonly class="readonly-input">
                    <small>이메일은 변경할 수 없습니다.</small>
                </div>

                <div class="input-group">
                    <label>전화번호</label>
                    <input type="text" name="user_phone" value="{{ user.user_phone }}" placeholder="010-0000-0000">
                </div>

                <div class="input-group">
                    <label>생년월일</label>
                    <input type="date" name="user_birth" value="{{ user.user_birth.strftime('%Y-%m-%d') if user.user_birth else '' }}">
                </div>

                <div class="input-group">
                    <label>새 비밀번호</label>
                    <input type="password" name="user_password" placeholder="변경 시에만 입력하세요">
                </div>

                <div class="form-actions">
                    <button type="submit" class="save-btn">저장하기</button>
                    <a href="{{ url_for('mypage.mypage') }}" class="cancel-btn">취소</a>
                </div>
            </form>
        </div>
    </section>
</div>
{% endblock %}




{% block script %}
<script>
const btn = document.querySelectorAll('.mypage_btn')[0];
if(btn){
    btn.classList.replace('mypage_btn', 'btn-chk')
}

document.querySelectorAll('.tab-btn').forEach(button => {
    button.addEventListener('click', () => {
        const target = button.getAttribute('data-target');

        // 1. 모든 버튼에서 active 제거 후 클릭한 버튼에 추가
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');

        // 2. 모든 섹션 숨긴 후 타겟 섹션만 표시
        document.querySelectorAll('.tab-section').forEach(section => section.classList.remove('active'));
        document.getElementById(target).classList.add('active');
    });
});
</script>
{% endblock %}
