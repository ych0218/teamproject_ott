<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 관리</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="admin_wrap">

    <aside class="admin_sidebar">
        <h2>
            <a href="{{ url_for('admin.admin_main') }}" class="admin_title">관리자</a>
        </h2>
        <ul>
            <li><a href="{{ url_for('admin.member_list') }}">회원 관리</a></li>
            <li><a href="{{ url_for('admin.content_list') }}">콘텐츠 관리</a></li>
            <li><a href="{{ url_for('admin.inquiry_list') }}" class="active">문의 관리</a></li>
            <li><a href="{{ url_for('admin.review_list') }}">리뷰 관리</a></li>
        </ul>
    </aside>

    <main class="admin_content">
        <h1>문의 관리</h1>

        <table class="admin_table">
            <thead>
                <tr>
                    <th>번호</th>
                    <th>회원번호</th>
                    <th>카테고리</th>
                    <th>제목</th>
                    <th>상태</th>
                    <th>작성일</th>
                </tr>
            </thead>
            <tbody>
                {% for inquiry in inquiry_list %}
                <tr>
                    <td>{{ inquiry.support_id }}</td>
                    <td>{{ inquiry.user_unique_id }}</td>
                    <td>{{ inquiry.category }}</td>
                    <td>{{ inquiry.title }}</td>
                    <td>{{ inquiry.status }}</td>
                    <td>{{ inquiry.created_at }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="6">문의 내역이 없습니다.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>

</div>

</body>
</html>
