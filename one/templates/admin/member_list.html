<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 관리</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="admin_wrap">

    <aside class="admin_sidebar">
        <h2>
            <a href="{{ url_for('admin.admin_main') }}" class="admin_title">관리자</a>
        </h2>
        <ul>
            <li><a href="{{ url_for('admin.member_list') }}" class="active">회원 관리</a></li>
            <li><a href="{{ url_for('admin.content_list') }}">콘텐츠 관리</a></li>
            <li><a href="{{ url_for('admin.inquiry_list') }}">문의 관리</a></li>
            <li><a href="{{ url_for('admin.review_list') }}">리뷰 관리</a></li>
        </ul>
    </aside>

    <main class="admin_content">
        <h1>회원 관리</h1>

        <table class="admin_table">
            <thead>
                <tr>
                    <th>번호</th>
                    <th>아이디</th>
                    <th>이름</th>
                    <th>이메일</th>
                    <th>전화번호</th>
                    <th>성별</th>
                    <th>비활성화</th>
                </tr>
            </thead>
            <tbody>
                {% for member in member_list %}
                <tr>
                    <td>{{ member.user_unique_id }}</td>
                    <td>{{ member.user_id }}</td>
                    <td>{{ member.user_name }}</td>
                    <td>{{ member.user_email }}</td>
                    <td>{{ member.user_phone }}</td>
                    <td>{{ member.user_gender }}</td>
                    <td>
                        <form action="{{ url_for('admin.member_delete', user_id=member.user_unique_id) }}" method="post">
                            <button type="submit" class="delete_btn">비활성화</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="7">회원 정보가 없습니다.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>

</div>

</body>
</html>
